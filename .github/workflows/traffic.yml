# .github/workflows/traffic.yml
name: Capture GitHub traffic

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0 * * *"  # daily, 00:15 UTC

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and store traffic
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          TRAFFIC_OWNER: ${{ secrets.TRAFFIC_OWNER }}
          TRAFFIC_REPO: ${{ secrets.TRAFFIC_REPO }}
        run: python traffic_logger.py

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic/traffic_log.csv
          git commit -m "Update traffic log" || exit 0
          git push
name: Capture GitHub traffic

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0 * * *"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and store traffic
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          TRAFFIC_OWNER: ${{ secrets.TRAFFIC_OWNER }}
          TRAFFIC_REPO: ${{ secrets.TRAFFIC_REPO }}
        run: python traffic_logger.py
        # ^ writes traffic/traffic_log.csv into the current (master) workspace

      - name: Commit CSV to analytics branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin --quiet
          git worktree prune
          git worktree add ../analytics origin/analytics
          mkdir -p ../analytics/traffic
          cp traffic/traffic_log.csv ../analytics/traffic/traffic_log.csv
          cd ../analytics
          git add traffic/traffic_log.csv
          git commit -m "chore: update traffic log $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Nothing new to commit"
          git push origin analytics